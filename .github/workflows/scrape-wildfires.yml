name: Sync Live NIFC Wildfire Data

on:
  schedule:
    # Runs automatically every 30 minutes, 24/7
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows you to manually trigger a data sync with a button push on GitHub

permissions:
  contents: write # Crucial: Gives the runner permission to save the scraped data back into your repo

jobs:
  run-scraper-job:
    runs-on: ubuntu-latest
    steps:
      # 1. Pull down the repository code into the virtual environment
      - name: Checkout repository code
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Initialize Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install required network dependencies
      - name: Install Request Frameworks
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4. Execute the Python scraper script
      - name: Query NIFC Services
        run: python scraper.py

      # 5. Check if the dataset changed, and commit it to production
      - name: Push Data to Live Site
        run: |
          git config --global user.name "Sun Sentinel Bot"
          git config --global user.email "newsroom-data-team@sunsentinel.com"
          git add data/wildfires.geojson
          # The conditional check prevents the script from crashing if no new fires occurred
          git diff-index --quiet HEAD || (git commit -m "Automated update of live wildfire layers" && git push)