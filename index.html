<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florida Active Wildfire Tracker</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    
    <style>
        body {
            margin: 0;
            padding: 10px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #map {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f5f5f5;
        }
        .map-footer {
            font-size: 11px;
            color: #666;
            margin-top: 12px;
            line-height: 1.5;
            border-top: 1px solid #eee;
            padding-top: 8px;
        }
        .leaflet-popup-content h3 {
            margin: 0 0 5px 0;
            font-size: 16px;
            color: #333;
        }
        .leaflet-popup-content p {
            margin: 3px 0;
            font-size: 13px;
            color: #555;
        }
        /* Custom Locate Me Button Styling */
        .locate-button {
            background-color: white;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: #333;
            text-decoration: none;
        }
        .locate-button:hover {
            background-color: #f4f4f4;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="map-footer">
        <strong>Source:</strong> National Interagency Fire Center (NIFC) Open Data GIS Clearinghouse.<br>
        <strong>Last Updated:</strong> <span id="update-time">Just now (Pending sync)</span><br>
        <strong>Update Frequency:</strong> This map automatically updates every 30 minutes with live federal dispatch data.
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <script>
        // Initialize map centered over Florida
        const map = L.map('map').setView([27.9944, -81.7603], 7);

        // Add background map tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Force a layout calculation refresh once the container finishes rendering
        setTimeout(() => {
            map.invalidateSize();
        }, 200);

        // ==========================================
        // ADD LOCATE ME BUTTON
        // ==========================================
        const locateControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function (map) {
                const container = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
                const button = L.DomUtil.create('a', 'locate-button', container);
                button.innerHTML = '🎯'; 
                button.title = "Locate Me";
                button.href = "#";

                button.onclick = function(e) {
                    e.preventDefault();
                    map.locate({setView: true, maxZoom: 12});
                }
                return container;
            }
        });
        map.addControl(new locateControl());

        let userMarker;
        map.on('locationfound', function(e) {
            if (userMarker) {
                map.removeLayer(userMarker);
            }
            userMarker = L.circleMarker(e.latlng, {
                radius: 8,
                fillColor: "#2980b9",
                color: "#ffffff",
                weight: 3,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map).bindPopup("📍 You are here!").openPopup();
        });

        map.on('locationerror', function(e) {
            alert("Could not find your location. Please make sure location services are enabled in your browser.");
        });

        // Dynamic circle sizes based on fire acreage
        function getRadius(acres) {
            if (acres > 10000) return 25;
            if (acres > 1000) return 18;
            if (acres > 100) return 12;
            if (acres > 10) return 8;
            return 5;
        }

        // Fetch the local data generated by scraper.py
        fetch('data/wildfires.geojson')
            .then(response => response.json())
            .then(data => {
                if (data && data.generated_at) {
                    const utcDate = new Date(data.generated_at);
                    const localTimeStr = utcDate.toLocaleString(undefined, {
                        month: 'long',
                        day: 'numeric',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: true
                    });
                    document.getElementById('update-time').innerText = localTimeStr;
                }

                // Plot the active fires on the map
                L.geoJSON(data, {
                    pointToLayer: function (feature, latlng) {
                        const props = feature.properties;
                        const acres = props.IncidentSize || 0;
                        
                        return L.circleMarker(latlng, {
                            radius: getRadius(acres),
                            fillColor: "#e65c00",
                            color: "#993d00",
                            weight: 1,
                            opacity: 0.9,
                            fillOpacity: 0.6
                        });
                    },
                    onEachFeature: function (feature, layer) {
                        const props = feature.properties;
                        const name = props.IncidentName || "Unnamed Fire";
                        const size = props.IncidentSize ? Number(props.IncidentSize).toLocaleString() : "Not Reported";
                        const containment = props.PercentContained !== undefined ? props.PercentContained : "Not Reported";

                        const popupContent = `
                            <h3>🔥 ${name}</h3>
                            <p><strong>Size:</strong> ${size} ${typeof props.IncidentSize === 'number' ? 'acres' : ''}</p>
                            <p><strong>Containment:</strong> ${containment}%</p>
                        `;
                        layer.bindPopup(popupContent);
                    }
                }).addTo(map);
            })
            .catch(error => {
                console.error('Error loading the wildfire data:', error);
            });
    </script>
</body>
</html>
